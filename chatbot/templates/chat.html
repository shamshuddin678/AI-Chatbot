<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #111827;
        font-family: "Poppins", sans-serif;
      }

      .chat-container {
        width: 1000px;
        height: 650px;
        margin: 30px auto;
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
      }

      .chat-header {
        background: #111827;
        color: #fff;
        padding: 18px;
        font-size: 28px;
        font-weight: bold;
        border-bottom: 1px solid #333;
      }

      .chat-box {
        height: 500px;
        overflow-y: auto;
        padding: 20px;
        background: #000;
        color: #fff;
      }

      .user {
        background: #202123;
        color: #ffffff;
        padding: 12px 18px;
        border-radius: 18px 18px 5px 18px;
        width: fit-content;
        max-width: 70%;
        margin-left: auto;
        margin-bottom: 15px;
      }

      .bot {
        background: #202123;
        color: #ffffff;
        padding: 12px 18px;
        border-radius: 18px 18px 18px 5px;
        width: fit-content;
        max-width: 70%;
        margin-bottom: 15px;
      }

      .card-footer {
        background: #111827;
        border-top: 1px solid #333;
      }

      #user-input {
        background: #202123;
        color: #ffffff;
        border: 1px solid #444;
        border-radius: 30px;
      }

      #user-input::placeholder {
        color: #bdbdbd;
      }

      #user-input:focus {
        background: #202123;
        color: #fff;
        border-color: #3b82f6;
        box-shadow: none;
      }

      .btn-success {
        border-radius: 30px;
        padding: 12px 28px;
      }
    </style>
  </head>

  <body>
    <div class="chat-container">
      <div class="chat-header">🤖 AI Chatbot</div>

      <div class="chat-box" id="chat-box"></div>

      <div class="card-footer">
        <div class="input-group">
          <input
            id="user-input"
            class="form-control"
            placeholder="Type your message..."
            autocomplete="off"
          />

          <button class="btn btn-success" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <script>
      async function sendMessage() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");

        const message = input.value.trim();

        if (message == "") return;

        chatBox.innerHTML += `
        <div class="user">
            ${message}
        </div>
    `;

        input.value = "";
        input.focus();

        chatBox.scrollTop = chatBox.scrollHeight;

        const typing = document.createElement("div");
        typing.className = "bot";
        typing.id = "typing";
        typing.innerHTML = "🤖 Typing...";
        chatBox.appendChild(typing);

        chatBox.scrollTop = chatBox.scrollHeight;

        const response = await fetch("", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            message: message,
          }),
        });

        const data = await response.json();

        document.getElementById("typing").remove();

        chatBox.innerHTML += `
        <div class="bot">
            ${data.reply}
        </div>
    `;

        chatBox.scrollTop = chatBox.scrollHeight;
      }

      document
        .getElementById("user-input")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();

            sendMessage();
          }
        });
    </script>
  </body>
</html>
